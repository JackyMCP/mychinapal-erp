<script type="text/babel">

const {useState, useMemo, useCallback, useEffect} = React;
const D = window.APP_DATA;

// ═══ CONSTANTS ═══
const QUARTERS = ['Q1_2025','Q2_2025','Q3_2025','Q4_2025','Q1_2026','Q2_2026','Q3_2026'];
const Q_LABELS = ['Q1 2025','Q2 2025','Q3 2025','Q4 2025','Q1 2026','Q2 2026','Q3 2026'];
const C = {
  navy:'#0A1628',navy2:'#112240',
  blue:'#2563EB',blue3:'#3B82F6',blight:'#EFF6FF',bmid:'#DBEAFE',
  red:'#DC2626',rlight:'#FEF2F2',rmid:'#FEE2E2',
  green:'#16A34A',glight:'#F0FDF4',
  orange:'#EA580C',olight:'#FFF7ED',
  purple:'#7C3AED',plight:'#F5F3FF',
  text:'#0F172A',text2:'#334155',muted:'#64748B',
  border:'#E2E8F0',bg:'#F4F7FC',white:'#FFFFFF',
};

// Row background colors matching Excel convention
const rowBg = (cat, dir, id) => {
  if(id && id.startsWith('S-')) return '#F8F8F8';
  const c = (cat||'').toUpperCase();
  if(c==='PRZYCHÓD' || dir==='WN+') return '#F0FDF4';
  if(c==='ZAKUP TOWARU CHINY') return '#EFF6FF';
  if(c==='TRANSPORT') return '#FEF3E8';
  if(c==='ODPRAWA CELNA') return '#FFF0F5';
  if(['PODATKI','ZUS','KSIĘGOWOŚĆ','CIT'].some(x=>c.includes(x))) return '#F5F3FF';
  if(c.includes('WERYFIKACJI') || c.includes('⚠️')) return '#FFFBEB';
  if(['WYNAGRODZENIA','BIURO','PODRÓŻE','PALIWO','MARKETING','NETWORKING','REPREZENTACJA','POZOSTAŁE','OPŁATY BANKOWE'].includes(c)) return '#F8F8F8';
  return C.white;
};

const fmt = (n,dec=2) => {
  if(n===null||n===undefined||n==='') return '—';
  const num = Number(n);
  if(isNaN(num)) return String(n);
  return num.toLocaleString('pl-PL',{minimumFractionDigits:dec,maximumFractionDigits:dec});
};
const fmtPct = n => (Number(n)*100).toFixed(1)+'%';

// ═══ PILL ═══
function Pill({type,small=false}) {
  const sz = small?{fontSize:9,padding:'1px 5px'}:{fontSize:10,padding:'2px 7px'};
  const map = {
    'ROZLICZONO CAŁKOWICIE':[C.glight,C.green],
    'NIE ROZLICZONO':['#FFF7ED',C.orange],
    'NIE PODLEGA':[C.bg,C.muted],
    'PRZYCHÓD':[C.glight,C.green],
    'ZAKUP TOWARU CHINY':[C.blight,C.blue],
    'TRANSPORT':['#FEF3E8','#C2410C'],
    'ODPRAWA CELNA':['#FFF0F5','#DB2777'],
    'PODATKI':[C.plight,C.purple],
    'ZUS':[C.plight,C.purple],
    'KSIĘGOWOŚĆ':[C.plight,C.purple],
    '⚠️ WYMAGA WERYFIKACJI':['#FFFBEB',C.orange],
    'przychod':[C.glight,C.green],
    'koszt':[C.rlight,C.red],
    'vat_odprawa':[C.plight,C.purple],
    'podatek':[C.plight,C.purple],
    'nie_podlega':[C.bg,C.muted],
    '✅ Rozliczone':[C.glight,C.green],
    '✅ Rozliczono':[C.glight,C.green],
    '⏳ Otwarte':['#FFF7ED',C.orange],
    'WN+':[C.glight,C.green],
    'MA-':[C.rlight,C.red],
    'KW-':['#F8F8F8',C.muted],
    'KP+':[C.glight,C.green],
    'WYNAGRODZENIA':['#F0F9FF','#0369A1'],
    'MARKETING':['#FDF4FF','#9333EA'],
    'BIURO':[C.bg,C.muted],
    'OPŁATY BANKOWE':[C.bg,C.muted],
    'PODRÓŻE':[C.bg,C.muted],
    'REPREZENTACJA':['#FFF7ED',C.orange],
    'POZOSTAŁE':[C.bg,C.muted],
    'KAPITAŁ':[C.bg,C.muted],
    'PALIWO':['#FEF3E8','#C2410C'],
  };
  const t2 = (type||'').toUpperCase();
  let cfg = map[type]||map[t2];
  if(!cfg) cfg=[C.bg,C.muted];
  return <span style={{display:'inline-flex',alignItems:'center',gap:2,...sz,borderRadius:20,fontWeight:700,backgroundColor:cfg[0],color:cfg[1],whiteSpace:'nowrap'}}>●&nbsp;{type||'—'}</span>;
}

// ═══ EDIT MODAL ═══
function EditModal({tx,onSave,onClose}) {
  const [assign,setAssign]=useState(tx.assign||'');

  const STATUSES=['ROZLICZONO CAŁKOWICIE','NIE ROZLICZONO','NIE PODLEGA','W TRAKCIE'];

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(10,22,40,.55)',zIndex:999,display:'flex',alignItems:'center',justifyContent:'center',padding:16}} onClick={onClose}>

        <div style={{fontFamily:"'Syne',sans-serif",fontSize:15,fontWeight:700,marginBottom:4}}>Edytuj transakcję</div>
        <div style={{fontSize:10,color:C.muted,marginBottom:10,display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
          <span style={{fontWeight:700,fontFamily:'monospace'}}>{tx.id}</span>
          <span>{tx.date}</span>
          <span style={{fontWeight:700,color:tx.amount>0?C.green:C.red}}>{tx.amount>0?'+':''}{fmt(tx.amount)} {tx.currency||'PLN'}</span>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
          <div>
            <label style={{fontSize:11,fontWeight:700,display:'block',marginBottom:4,color:C.text}}>Przypisanie (klient) *</label>
            <select style={{border:`1px solid ${assign?C.border:'#FDE68A'}`,borderRadius:6,padding:'7px 8px',fontSize:11,width:'100%',outline:'none',background:assign?C.white:'#FFFBEB'}}
              value={assign} onChange={e=>setAssign(e.target.value)}>
              <option value="">— wybierz klienta —</option>
              {D.lista_przyp.map(c=><option key={c} value={c}>{c}</option>)}

          </div>
          <div>

          <span style={{fontSize:10,color:C.muted,marginRight:'auto'}}>* pola wymagane do rozliczenia</span>
          <button onClick={onClose} style={{padding:'7px 14px',borderRadius:7,border:`1px solid ${C.border}`,fontSize:12,fontWeight:600,cursor:'pointer',background:'transparent',color:C.text2}}>Anuluj</button>
          <button onClick={()=>onSave(tx.id,{assign,order,category:cat,flow_type:flow,status,notes,vat_rate})} 
            style={{padding:'7px 14px',borderRadius:7,border:'none',fontSize:12,fontWeight:600,cursor:'pointer',background:C.blue,color:'#fff'}}>
            💾 Zapisz zmiany
          </button>
        </div>
      </div>
    </div>
  );
}

// ═══ TAB: TRANSAKCJE ═══
function TabTransakcje({txs,setTxs,initialSearch,initialQ}) {
  const [selQ,setSelQ]=useState(initialQ||'Q2_2026');
  const [filter,setFilter]=useState('wszystkie');
  const [search,setSearch]=useState(initialSearch||'');
  const [editTx,setEditTx]=useState(null);
  const [sortCol,setSortCol]=useState('date');
  const [sortAsc,setSortAsc]=useState(true);
  const [showSRows,setShowSRows]=useState(false);
  const [page,setPage]=useState(0);
  const PAGE_SIZE=50;

  const handleSort = col => { if(sortCol===col) setSortAsc(a=>!a); else {setSortCol(col);setSortAsc(true);} };

  const filtered = useMemo(()=>{
    let list = txs.filter(t=>{
      if(selQ!=='wszystkie' && t.q!==selQ) return false;
      if(!showSRows && t.id.startsWith('S-') && !t.contractor && !t.amount) return false;
      const cat=(t.category||'').toUpperCase();
      if(filter==='wplywy') return t.direction==='WN+';
      if(filter==='wyplywy') return t.direction==='MA-';
      if(filter==='przychody') return cat==='PRZYCHÓD';
      if(filter==='zakupy') return cat==='ZAKUP TOWARU CHINY';
      if(filter==='transport') return cat==='TRANSPORT';
      if(filter==='odprawa') return cat==='ODPRAWA CELNA';
      if(filter==='podatki') return ['PODATKI','ZUS'].includes(cat);
      if(filter==='s_rows') return t.id.startsWith('S-');
      if(filter==='weryfikacja') return cat.includes('WERYFIKACJI')||(!t.assign&&!t.id.startsWith('S-')&&['WN+','MA-'].includes(t.direction));
      if(filter==='nierozl') return t.status==='NIE ROZLICZONO';
      if(filter==='wydat') return ['BIURO','MARKETING','NETWORKING','PODRÓŻE','PALIWO','REPREZENTACJA','POZOSTAŁE','WYNAGRODZENIA','OPŁATY BANKOWE'].includes(cat);
      if(search) {
        const s=search.toLowerCase();
        return (t.contractor||'').toLowerCase().includes(s)||(t.desc||'').toLowerCase().includes(s)||(t.assign||'').toLowerCase().includes(s)||(t.id||'').toLowerCase().includes(s);
      }
      return true;
    });
    list.sort((a,b)=>{
      let av=a[sortCol]||'', bv=b[sortCol]||'';
      if(typeof av==='number') return sortAsc?av-bv:bv-av;
      return sortAsc?String(av).localeCompare(String(bv)):String(bv).localeCompare(String(av));
    });
    return list;
  },[txs,selQ,filter,search,showSRows,sortCol,sortAsc]);

  const paginated = filtered.slice(page*PAGE_SIZE,(page+1)*PAGE_SIZE);
  const totalPages = Math.ceil(filtered.length/PAGE_SIZE);

  useEffect(()=>{setPage(0);},[selQ,filter,search]);

  const unassigned=txs.filter(t=>!t.assign&&!t.id.startsWith('S-')&&['WN+','MA-'].includes(t.direction)).length;
  const weryfikacja=txs.filter(t=>(t.category||'').includes('WERYFIKACJI')).length;

  const handleSave=(id,changes)=>{
    setTxs(p=>p.map(t=>t.id===id?{...t,...changes}:t));
    setEditTx(null);
  };

  const SortTh=({col,label,right=false})=>(
    <th onClick={()=>handleSort(col)} style={{textAlign:right?'right':'left',padding:'6px 8px',fontSize:9,fontWeight:700,color:sortCol===col?C.blue:C.muted,textTransform:'uppercase',letterSpacing:'.04em',borderBottom:`1px solid ${C.border}`,cursor:'pointer',whiteSpace:'nowrap',userSelect:'none'}}>
      {label}{sortCol===col?(sortAsc?' ↑':' ↓'):''}
    </th>
  );

  const CHIPS=[
    {k:'wszystkie',l:'Wszystkie'},
    {k:'wplywy',l:'↑ WN+ Wpływy'},
    {k:'wyplywy',l:'↓ MA- Wypływy'},
    {k:'przychody',l:'Przychody'},
    {k:'zakupy',l:'Zakup Chiny'},
    {k:'transport',l:'Transport'},
    {k:'odprawa',l:'Odprawa celna'},
    {k:'podatki',l:'Podatki/ZUS'},
    {k:'wydat',l:'Wydatki firmowe'},
    {k:'nierozl',l:'NIE ROZLICZONO'},
    {k:'s_rows',l:'Wiersze S-'},
    {k:'weryfikacja',l:`⚠️ Weryfikacja (${unassigned+weryfikacja})`,danger:true},
  ];

  return (
    <div>
      {/* Quarter tabs */}
      <div style={{display:'flex',gap:4,marginBottom:10,flexWrap:'wrap',alignItems:'center'}}>
        <span style={{fontSize:10,color:C.muted,fontWeight:600,flexShrink:0}}>Kwartał:</span>
        {[{k:'wszystkie',l:'Wszystkie (662)'},...QUARTERS.map((q,i)=>({k:q,l:`${Q_LABELS[i]}`}))].map(({k,l})=>(
          <div key={k} onClick={()=>{setSelQ(k);setFilter('wszystkie');}} style={{
            padding:'3px 9px',borderRadius:5,fontSize:11,cursor:'pointer',fontWeight:600,
            border:`1px solid ${selQ===k?C.blue:C.border}`,
            background:selQ===k?C.blue:'transparent',color:selQ===k?'#fff':C.muted,
          }}>{l}</div>
        ))}
        <div style={{marginLeft:'auto',display:'flex',gap:6,alignItems:'center'}}>
          <label style={{display:'flex',alignItems:'center',gap:4,fontSize:10,color:C.muted,cursor:'pointer'}}>
            <input type="checkbox" checked={showSRows} onChange={e=>setShowSRows(e.target.checked)}/>
            Pokaż wiersze S-
          </label>
          <input value={search} onChange={e=>{setSearch(e.target.value);setFilter('wszystkie');}}
            placeholder="🔍 Szukaj..." style={{border:`1px solid ${C.border}`,borderRadius:6,padding:'5px 9px',fontSize:11,outline:'none',width:180}}/>
        </div>
      </div>

      {/* Filter chips */}
      <div style={{display:'flex',gap:4,marginBottom:10,flexWrap:'wrap'}}>
        {CHIPS.map(({k,l,danger})=>(
          <div key={k} onClick={()=>{setFilter(k);setSearch('');}} style={{
            padding:'3px 9px',borderRadius:5,fontSize:10.5,cursor:'pointer',fontWeight:600,
            border:`1px solid ${filter===k?C.blue:danger?C.rmid:C.border}`,
            background:filter===k?C.blue:danger?C.rlight:'transparent',
            color:filter===k?'#fff':danger?C.red:C.muted,
          }}>{l}</div>
        ))}
      </div>

      {/* Info bar */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8,fontSize:10.5,color:C.muted}}>
        <span>Wyświetlono <strong style={{color:C.text}}>{filtered.length}</strong> z <strong style={{color:C.text}}>662</strong> transakcji · strona {page+1}/{totalPages||1}</span>
        <div style={{display:'flex',gap:4}}>
          <button onClick={()=>setPage(p=>Math.max(0,p-1))} disabled={page===0} style={{padding:'3px 8px',borderRadius:4,border:`1px solid ${C.border}`,fontSize:10,cursor:'pointer',background:page===0?C.bg:C.white,color:page===0?C.muted:C.text2}}>‹ Poprz.</button>
          {Array.from({length:Math.min(5,totalPages)},(_,i)=>{
            let pg=i; if(page>2&&totalPages>5) pg=page-2+i;
            if(pg>=totalPages) return null;
            return <button key={pg} onClick={()=>setPage(pg)} style={{padding:'3px 7px',borderRadius:4,border:`1px solid ${pg===page?C.blue:C.border}`,fontSize:10,cursor:'pointer',background:pg===page?C.blue:C.white,color:pg===page?'#fff':C.text2}}>{pg+1}</button>;
          })}
          <button onClick={()=>setPage(p=>Math.min(totalPages-1,p+1))} disabled={page>=totalPages-1} style={{padding:'3px 8px',borderRadius:4,border:`1px solid ${C.border}`,fontSize:10,cursor:'pointer',background:page>=totalPages-1?C.bg:C.white,color:page>=totalPages-1?C.muted:C.text2}}>Nast. ›</button>
        </div>
      </div>

      {/* Legenda */}
      <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:8}}>
        {[['#F0FDF4','Przychód/WN+'],['#EFF6FF','Zakup Chiny'],['#FEF3E8','Transport'],['#FFF0F5','Odprawa'],['#F5F3FF','Podatki/ZUS'],['#FFFBEB','Do weryfikacji'],['#F8F8F8','Wydatki/S-']].map(([bg,l])=>(
          <div key={l} style={{display:'flex',alignItems:'center',gap:3,fontSize:9.5,color:C.muted}}>
            <div style={{width:10,height:10,borderRadius:2,background:bg,border:`1px solid ${C.border}`}}></div>{l}
          </div>
        ))}
      </div>

      <div style={{overflowX:'auto',borderRadius:8,border:`1px solid ${C.border}`}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:11.5}}>
          <thead>
            <tr style={{background:C.bg}}>
              <SortTh col="id" label="ID"/>
              <SortTh col="date" label="Data"/>
              <SortTh col="contractor" label="Kontrahent"/>
              <th style={{textAlign:'left',padding:'6px 8px',fontSize:9,fontWeight:700,color:C.muted,textTransform:'uppercase',letterSpacing:'.04em',borderBottom:`1px solid ${C.border}`,whiteSpace:'nowrap'}}>Opis</th>
              <SortTh col="amount" label="Kwota" right/>
              <th style={{padding:'6px 8px',fontSize:9,fontWeight:700,color:C.muted,textTransform:'uppercase',letterSpacing:'.04em',borderBottom:`1px solid ${C.border}`}}>Kier.</th>
              <SortTh col="assign" label="Przypisanie"/>
              <SortTh col="order" label="Zamówienie"/>
              <SortTh col="flow_type" label="Typ"/>
              <SortTh col="category" label="Kategoria"/>
              <SortTh col="status" label="Status"/>
              <th style={{padding:'6px 8px',fontSize:9,fontWeight:700,color:C.muted,textTransform:'uppercase',letterSpacing:'.04em',borderBottom:`1px solid ${C.border}`}}>Konto</th>
              <th style={{padding:'6px 8px',fontSize:9,fontWeight:700,color:C.muted,textTransform:'uppercase',letterSpacing:'.04em',borderBottom:`1px solid ${C.border}`}}>Uwagi</th>
              <th style={{padding:'6px 8px',borderBottom:`1px solid ${C.border}`}}></th>
            </tr>
          </thead>
          <tbody>
            {paginated.map((t,i)=>{
              const bg=rowBg(t.category,t.direction,t.id);
              const missingAssign=!t.assign&&!t.id.startsWith('S-')&&['WN+','MA-'].includes(t.direction);
              return (
                <tr key={t.id+i} style={{background:bg}} onMouseEnter={e=>e.currentTarget.style.filter='brightness(0.95)'} onMouseLeave={e=>e.currentTarget.style.filter=''}>
                  <td style={{padding:'6px 8px',borderBottom:`1px solid ${C.border}`,fontFamily:'monospace',fontSize:9.5,color:t.id.startsWith('S-')?C.muted:C.blue,whiteSpace:'nowrap'}}>{t.id}</td>
                  <td style={{padding:'6px 8px',borderBottom:`1px solid ${C.border}`,whiteSpace:'nowrap',fontSize:10,color:C.muted}}>{t.date}</td>
                  <td style={{padding:'6px 8px',borderBottom:`1px solid ${C.border}`,maxWidth:140,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontWeight:500,fontSize:11}} title={t.contractor}>{t.contractor||<span style={{color:C.muted,fontStyle:'italic'}}>—</span>}</td>
                  <td style={{padding:'6px 8px',borderBottom:`1px solid ${C.border}`,maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:C.muted,fontSize:10}} title={t.desc}>{t.desc||'—'}</td>
                  <td style={{padding:'6px 8px',borderBottom:`1px solid ${C.border}`,textAlign:'right',fontWeight:700,color:t.amount>0?C.green:t.amount<0?C.red:C.muted,whiteSpace:'nowrap',fontSize:11.5}}>
                    {t.amount!==0?(t.amount>0?'+':'')+fmt(t.amount,2):'—'}
                  </td>
                  <td style={{padding:'6px 8px',borderBottom:`1px solid ${C.border}`}}>{t.direction?<Pill type={t.direction} small/>:<span style={{color:C.muted,fontSize:10}}>—</span>}</td>
                  <td style={{padding:'6px 8px',borderBottom:`1px solid ${C.border}`,fontWeight:t.assign?600:400,whiteSpace:'nowrap',fontSize:10.5}}>
                    {missingAssign?<span style={{background:'#FFFBEB',border:'1px solid #FDE68A',borderRadius:3,padding:'1px 5px',fontSize:9,color:C.orange}}>⚠️ brak</span>:(t.assign||<span style={{color:C.muted,fontSize:10}}>—</span>)}
                  </td>
                  <td style={{padding:'6px 8px',borderBottom:`1px solid ${C.border}`,fontSize:10,color:C.muted,whiteSpace:'nowrap'}}>{t.order||'—'}</td>
                  <td style={{padding:'6px 8px',borderBottom:`1px solid ${C.border}`}}>{t.flow_type?<Pill type={t.flow_type} small/>:<span style={{color:C.muted,fontSize:10}}>—</span>}</td>
                  <td style={{padding:'6px 8px',borderBottom:`1px solid ${C.border}`}}>{t.category?<Pill type={t.category} small/>:<span style={{color:C.muted,fontSize:10}}>—</span>}</td>
                  <td style={{padding:'6px 8px',borderBottom:`1px solid ${C.border}`,fontSize:10,whiteSpace:'nowrap'}}>
                    {t.status?<span style={{fontSize:9.5,color:t.status==='ROZLICZONO CAŁKOWICIE'?C.green:t.status==='NIE ROZLICZONO'?C.orange:C.muted}}>{t.status}</span>:'—'}
                  </td>
                  <td style={{padding:'6px 8px',borderBottom:`1px solid ${C.border}`,fontSize:9.5,color:C.muted,whiteSpace:'nowrap'}}>{(t.account||'').replace('PLN — ','').replace(' — pomocniczy','')}</td>
                  <td style={{padding:'6px 8px',borderBottom:`1px solid ${C.border}`,maxWidth:120,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:9.5,color:C.muted}} title={t.notes}>{t.notes||'—'}</td>
                  <td style={{padding:'6px 8px',borderBottom:`1px solid ${C.border}`,whiteSpace:'nowrap'}}>
                    <button onClick={()=>setEditTx(t)} style={{padding:'2px 8px',borderRadius:4,border:`1px solid ${missingAssign?C.orange:C.border}`,fontSize:10,cursor:'pointer',background:missingAssign?'#FFFBEB':'transparent',color:missingAssign?C.orange:C.text2,whiteSpace:'nowrap',fontWeight:missingAssign?700:400}}>
                      {missingAssign?'⚠️ Przypisz':'Edytuj'}
                    </button>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
        {filtered.length===0&&<div style={{textAlign:'center',padding:48,color:C.muted,fontSize:12}}>Brak transakcji dla wybranego filtra</div>}
      </div>
      {editTx&&<EditModal tx={editTx} onSave={handleSave} onClose={()=>setEditTx(null)}/>}
    </div>
  );
}

// ═══ TAB: KONTROLA KASY ═══
function TabKontrolaKasy() {
  const [selQ,setSelQ]=useState('Q2_2026');
  const qi=QUARTERS.indexOf(selQ);
  const kk=D.kk;

  const getVal=(label,idx)=>{
    const row=kk[label]||kk[' '+label]||kk['  '+label];
    if(!row) return 0;
    return row[idx]||0;
  };

  const KK_ROWS=[
    {label:'wpływy (WN+)',           key:'  wpływy (WN+)',            color:C.green,  bold:false},
    {label:'wypływy (MA-)',          key:'  wypływy (MA-)',            color:C.red,    bold:false},
    {label:'Przychód netto (po VAT)',key:'Przychód netto (po VAT)',   color:C.blue,   bold:false},
    {label:'Koszty (bezpośr.+oper.)',key:'Koszty (bezpośr. + operac.)',color:C.red,   bold:false},
    {label:'MARŻA OPERACYJNA',       key:'MARŻA OPERACYJNA',          color:null,     bold:true},
    {label:'Podatki (CIT/VAT/ZUS)', key:'Podatki (CIT/VAT/ZUS)',     color:C.purple, bold:false},
    {label:'Nierozliczonych',        key:'Nierozliczonych',           color:C.orange, bold:false, count:true},
    {label:'Rozliczonych całkowicie',key:'Rozliczonych całkowicie',   color:C.green,  bold:false, count:true},
  ];

  return (
    <div>
      <div style={{display:'flex',gap:4,marginBottom:14,flexWrap:'wrap',alignItems:'center'}}>
        <span style={{fontSize:10,color:C.muted,fontWeight:600}}>Kwartał:</span>
        {[...QUARTERS.map((q,i)=>({k:q,l:Q_LABELS[i]})),{k:'razem',l:'RAZEM'}].map(({k,l})=>(
          <div key={k} onClick={()=>setSelQ(k)} style={{
            padding:'4px 10px',borderRadius:5,fontSize:11,cursor:'pointer',fontWeight:600,
            border:`1px solid ${selQ===k?C.blue:C.border}`,
            background:selQ===k?C.blue:'transparent',color:selQ===k?'#fff':C.muted,
          }}>{l}</div>
        ))}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
        {/* Przepływy */}
        <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:10,padding:'14px 16px'}}>
          <div style={{fontSize:12,fontWeight:700,marginBottom:12,color:C.text}}>
            📊 Przepływy finansowe — {selQ==='razem'?'WSZYSTKIE KWARTAŁY':Q_LABELS[qi]}
          </div>
          {KK_ROWS.map((r,i)=>{
            const val = selQ==='razem' ? (kk[r.key]||kk['  '+r.key.trim()]||kk[' '+r.key.trim()]||[])[7]||0 : getVal(r.key, qi);
            const isMarza = r.key==='MARŻA OPERACYJNA';
            const color = isMarza ? (val>=0?C.green:C.red) : r.color;
            return (
              <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:i<KK_ROWS.length-1?`1px solid ${C.border}`:'none',borderTop:r.bold&&i>0?`1.5px solid ${C.border}`:'none',marginTop:r.bold&&i>0?4:0}}>
                <span style={{fontSize:11,fontWeight:r.bold?700:400,color:r.bold?C.text:C.text2}}>{r.label}</span>
                <span style={{fontSize:r.bold?15:12,fontWeight:700,color}}>
                  {r.count ? val : ((val>0&&!r.key.includes('ypływ'))?'+':'')+fmt(val,0)+' PLN'}
                </span>
              </div>
            );
          })}
        </div>

        {/* Stan kont + tabela kwartalna */}
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:10,padding:'14px 16px'}}>
            <div style={{fontSize:12,fontWeight:700,marginBottom:12}}>🏦 Stan kont na koniec {selQ==='razem'?'Q3 2026 (ostatni)':Q_LABELS[qi]}</div>
            {D.stan_kont.filter(s=>s.label!=='EUR').map((s,i)=>{
              const vIdx=selQ==='razem'?6:qi;
              const val=s.vals[vIdx];
              return (
                <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:i<3?`1px solid ${C.border}`:'none'}}>
                  <div>
                    <div style={{fontSize:11,fontWeight:600}}>{s.label.replace(' [PLN]','').replace(' [CNY]','').replace(' [USD]','')}</div>
                    <div style={{fontSize:9.5,color:C.muted}}>{s.label.includes('PLN')?'PLN':s.label.includes('CNY')?'CNY':'USD'}</div>
                  </div>
                  <span style={{fontSize:15,fontWeight:700,color:val<0?C.red:val>0?C.blue:C.muted}}>{fmt(val)}</span>
                </div>
              );
            })}
          </div>

          {/* Mini marża tabela */}
          <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:10,padding:'14px 16px',overflowX:'auto'}}>
            <div style={{fontSize:11,fontWeight:700,marginBottom:8,color:C.text}}>Marża operacyjna per kwartał</div>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:10.5}}>
              <thead><tr style={{background:C.bg}}>
                {Q_LABELS.map(q=><th key={q} style={{padding:'4px 6px',fontWeight:700,color:C.muted,textAlign:'right',whiteSpace:'nowrap',fontSize:9}}>{q}</th>)}
                <th style={{padding:'4px 6px',fontWeight:700,color:C.navy,textAlign:'right',fontSize:9}}>RAZEM</th>
              </tr></thead>
              <tbody><tr>
                {(kk['MARŻA OPERACYJNA']||[]).map((m,i)=>(
                  <td key={i} style={{padding:'5px 6px',textAlign:'right',fontWeight:700,color:m>0?C.green:C.red,whiteSpace:'nowrap',fontSize:10.5}}>
                    {m>0?'+':''}{Math.abs(m)>=1000?(m/1000).toFixed(1)+'k':fmt(m,0)}
                  </td>
                ))}
              </tr></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  );
}

// ═══ TAB: VAT ═══

  return (
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>

        <div style={{fontSize:12,fontWeight:700,marginBottom:12}}>📋 Podsumowanie VAT — całość (arkusz Podsumowanie_VAT)</div>
        {D.vat.map((r,i)=>{
          const isTotal=r.label.includes('DO ZAPŁATY')||r.label.includes('POZOSTAŁO');
          const color=r.label.includes('należny')?C.red:r.label.includes('naliczony')&&!r.label.includes('razem')?C.green:r.label.includes('razem')?C.green:r.label.includes('POZOSTAŁO')?(r.val>0?C.red:C.green):r.label.includes('nadpłata')?C.blue:C.text;
          return (
            <div key={i} style={{padding:'8px 0',borderBottom:i<D.vat.length-1?`1px solid ${C.border}`:'none',borderTop:isTotal&&i>0?`1.5px solid ${C.border}`:'none',marginTop:isTotal&&i>0?4:0}}>

                <span style={{fontSize:11,fontWeight:isTotal?700:400}}>{r.label}</span>
                <span style={{fontSize:isTotal?14:12,fontWeight:700,color}}>{fmt(r.val)} PLN</span>
              </div>
              {r.desc&&<div style={{fontSize:9.5,color:C.muted,marginTop:1,lineHeight:1.3}}>{r.desc}</div>}
            </div>

        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:9,marginBottom:11}}>

            const val=s.vals[qi]||0;
            const cur=s.label.includes('CNY')?'CNY':s.label.includes('USD')?'USD':'PLN';
            return (
              <div key={i} style={{background:i===0?C.navy:C.navy2,borderRadius:9,padding:'12px 14px',color:'#fff'}}>

                <div style={{fontSize:9.5,color:'rgba(255,255,255,.32)',marginTop:2}}>na koniec {Q_LABELS[qi]}</div>
              </div>

        </div>

        {/* KPI */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:9,marginBottom:11}}>
          {[
            {l:'Marża operacyjna',v:getKK('MARŻA OPERACYJNA',qi),fmt:true,bl:getKK('MARŻA OPERACYJNA',qi)>=0?C.green:C.red},
            {l:'Przychód netto',  v:getKK('Przychód netto (po VAT)',qi),fmt:true,bl:C.blue},
            {l:'Podatki',         v:getKK('Podatki (CIT/VAT/ZUS)',qi),fmt:true,bl:C.purple},
            {l:'Nierozliczonych', v:getKK('Nierozliczonych',qi),fmt:false,bl:getKK('Nierozliczonych',qi)>0?C.orange:C.green,delta:`Rozliczonych: ${getKK('Rozliczonych całkowicie',qi)}`},
          ].map((k,i)=>{
            const color=k.l==='Marża operacyjna'?(k.v>=0?C.green:C.red):k.l==='Podatki'?C.purple:k.l==='Przychód netto'?C.blue:(k.v>0?C.orange:C.green);
            return (
              <div key={i} style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:9,padding:'10px 13px',borderLeft:`3px solid ${k.bl}`}}>
                <div style={{fontSize:9.5,color:C.muted,textTransform:'uppercase',letterSpacing:'.05em',marginBottom:3}}>{k.l} — {Q_LABELS[qi]}</div>
                <div style={{fontFamily:"'Syne',sans-serif",fontSize:18,fontWeight:700,color}}>
                  {k.fmt?((k.v>0?'+':'')+fmt(k.v,0)+' PLN'):k.v}
                </div>
                {k.delta&&<div style={{fontSize:9.5,color:C.muted,marginTop:1}}>{k.delta}</div>}
              </div>
            );
          })}
        </div>

        {/* TABS */}
        <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:10,marginBottom:20,overflow:'hidden'}}>
          <div style={{display:'flex',borderBottom:`1px solid ${C.border}`,padding:'0 16px',overflowX:'auto'}}>
            {TABS.map(t=>(
              <div key={t.k} onClick={()=>setTab(t.k)} style={{padding:'10px 14px',fontSize:11,fontWeight:600,cursor:'pointer',whiteSpace:'nowrap',borderBottom:`2px solid ${tab===t.k?C.blue:'transparent'}`,marginBottom:-1,color:tab===t.k?C.blue:t.danger?C.red:C.muted,display:'flex',alignItems:'center',gap:5}}>
                {t.l}
                {t.badge&&<span style={{background:C.red,color:'#fff',fontSize:9,fontWeight:700,padding:'1px 5px',borderRadius:8}}>{t.badge}</span>}
              </div>
            ))}
          </div>
          <div style={{padding:16}}>
            {tab==='transakcje'&&<TabTransakcje key={bankSeed?bankSeed.nonce:0} txs={txs} setTxs={setTxs} initialSearch={bankSeed?bankSeed.search:''} initialQ={bankSeed?bankSeed.q:null}/>}
            {tab==='kontrola'&&<TabKontrolaKasy/>}

            {tab==='cykliczne'&&<TabCykliczne/>}
            {tab==='prognoza'&&<TabPrognoza/>}
          </div>
        </div>
      </div>
    </div>
  );
}

function StatCard({label,value,color,sub}) {
  return (
    <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:9,padding:'10px 13px',borderLeft:`3px solid ${color||C.blue}`}}>
      <div style={{fontSize:9.5,color:C.muted,textTransform:'uppercase',letterSpacing:'.05em',marginBottom:3}}>{label}</div>
      <div style={{fontFamily:"'Syne',sans-serif",fontSize:18,fontWeight:700,color:color||C.text}}>{value}</div>
      {sub&&<div style={{fontSize:9.5,color:C.muted,marginTop:1}}>{sub}</div>}
    </div>
  );
}

function SectionCard({title,right,children,style}) {
  return (
    <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:10,padding:'14px 16px',marginBottom:14,...style}}>
      {title&&<div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <div style={{fontSize:12,fontWeight:700}}>{title}</div>
        {right}
      </div>}
      {children}
    </div>
  );
}

function Badge({children,color,bg}) {
  return <span style={{fontSize:9.5,fontWeight:700,padding:'2px 7px',borderRadius:5,color:color||C.blue,background:bg||C.blight}}>{children}</span>;
}

function NoteBox({children}) {
  return <div style={{background:C.olight,border:`1px solid #FDE4CC`,borderRadius:7,padding:'8px 11px',fontSize:10.5,color:'#9A3412',lineHeight:1.5,marginTop:8}}>ℹ️ {children}</div>;
}

function PageHeader({title,subtitle,right}) {
  return (
    <div style={{padding:'16px 22px',borderBottom:`1px solid ${C.border}`,background:C.white,display:'flex',alignItems:'center',gap:12}}>
      <div style={{flex:1}}>
        <div style={{fontFamily:"'Syne',sans-serif",fontSize:16,fontWeight:800,color:C.navy}}>{title}</div>
        {subtitle&&<div style={{fontSize:11,color:C.muted,marginTop:1}}>{subtitle}</div>}
      </div>
      {right}
    </div>
  );
}

function BackBtn({onClick,label}) {
  return <div onClick={onClick} style={{display:'inline-flex',alignItems:'center',gap:5,fontSize:11,fontWeight:600,color:C.blue,cursor:'pointer',marginBottom:12}}>← {label||'Wróć do listy'}</div>;
}

function Sidebar({module,setModule,collapsed,setCollapsed,alerts}) {
  return (
    <div style={{width:collapsed?58:214,transition:'width .15s ease',background:C.navy,color:'#fff',display:'flex',flexDirection:'column',flexShrink:0,minHeight:'100vh'}}>
      <div style={{padding:'14px 12px',display:'flex',alignItems:'center',gap:8,borderBottom:'1px solid rgba(255,255,255,.08)',minHeight:30}}>
        <div style={{width:28,height:28,borderRadius:7,background:`linear-gradient(135deg,${C.blue},${C.blue3})`,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:11,flexShrink:0}}>MC</div>
        {!collapsed&&<div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:13,whiteSpace:'nowrap'}}>My<span style={{color:C.blue3}}>China</span>Pal</div>}
      </div>
      <div style={{flex:1,overflowY:'auto',padding:'8px 6px'}}>
        {MODULES.map(m=>(
          <div key={m.k} onClick={()=>setModule(m.k)} title={collapsed?m.l:''} style={{display:'flex',alignItems:'center',gap:9,padding:'9px 9px',borderRadius:7,cursor:'pointer',marginBottom:2,background:module===m.k?'rgba(37,99,235,.28)':'transparent',color:module===m.k?'#fff':'rgba(255,255,255,.62)',fontSize:11.5,fontWeight:module===m.k?700:500}}>
            <span style={{fontSize:15,width:18,textAlign:'center',flexShrink:0}}>{m.icon}</span>
            {!collapsed&&<span style={{whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',flex:1}}>{m.l}</span>}

        {collapsed?'»':'«  Zwiń pasek'}
      </div>
    </div>
  );
}

function Dashboard({goClient,goProject}) {
  const qi = QUARTERS.length-1;
  const qiFull = QUARTERS.length-2;
  const kk = D.kk;
  const getKK=(label,i)=>{const r=kk[label]||kk[' '+label]||kk['  '+label];return r?(r[i]||0):0;};
  const stanKont = D.stan_kont;

  const topClients = [...D.clients].filter(c=>c.margin!==0).sort((a,b)=>b.margin-a.margin).slice(0,5);

  const activeProjects = D.projects.filter(p=>p.active && p.stage!=='Zapłata').slice(0,6);

  const upcoming = [
    {d:'20.07.2026', n:'ZUS — składki społeczne', a:-1550, t:'ZUS'},

    {d:'10.08.2026', n:'Wynagrodzenia 07/2026', a:-479.32, t:'Wynagrodzenia'},
  ];
  const mailUnread = [
    {from:'Centrum Lok 1 Sp. z o.o.', subj:'Re: Zamówienie 9 — termin dostawy', mailbox:'jacek@', client:'Centrum Lok 1'},
    {from:'RUSAK BUSINESS SERVICES', subj:'SAD — odprawa Rodlew QMD Zam.2', mailbox:'adam@', client:'Rodlew QMD'},
    {from:'Toolsen Polska', subj:'Zapytanie o fakturę korygującą', mailbox:'marek@', client:'Toolsen Polska'},
  ];
  const chatUnread = [
    {channel:'#Rodlew QMD — Zamówienie 2', msgs:3, client:'Rodlew QMD'},
    {channel:'#ogólny', msgs:5, client:null},
  ];

  const maxBar = Math.max(...QUARTERS.map((_,j)=>Math.max(getKK('Przychód netto (po VAT)',j),Math.abs(getKK('Koszty (bezpośr. + operac.)',j)))),1);

      <PageHeader title="Dashboard" subtitle={`Ostatni pełny kwartał: ${Q_LABELS[qiFull]} · dane cząstkowe: ${Q_LABELS[qi]}`}/>

        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:9,marginBottom:14}}>

            return (
              <div key={i} style={{background:i===0?C.navy:C.navy2,borderRadius:9,padding:'12px 14px',color:'#fff'}}>
                <div style={{fontSize:9.5,color:'rgba(255,255,255,.4)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:2}}>{s.label.replace(' [PLN]','').replace(' [CNY]','').replace(' [USD]','')}</div>

              const rev=getKK('Przychód netto (po VAT)',i);

              return (
                <div key={q} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
                  <div style={{display:'flex',gap:3,alignItems:'flex-end',height:100}}>

                  </div>
                  <div style={{fontSize:9.5,color:C.muted}}>{Q_LABELS[i]}</div>

            })}
          </div>
          <div style={{display:'flex',gap:14,marginTop:6,fontSize:10,color:C.muted}}>

            {openClients.map(c=>(
              <div key={c.id} onClick={()=>goClient(c.name)} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 0',borderBottom:`1px solid ${C.border}`,cursor:'pointer'}}>

                  <div style={{fontSize:9.5,color:C.muted}}>{c.open_orders_count} otwarte zlecenie(a)</div>

        </div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
          <SectionCard title="Nadchodzące płatności (30 dni)">
            {upcoming.map((u,i)=>(

                <div style={{fontWeight:700,color:C.red,fontSize:11.5}}>{fmt(u.a)} PLN</div>
              </div>
            ))}
            <NoteBox>Przykładowe pozycje — docelowo zasilane z zakładki „Płatności cykliczne” w Kasa & Bank.</NoteBox>
          </SectionCard>

          <SectionCard title="Aktywne projekty">
            {activeProjects.map(p=>(
              <div key={p.id} onClick={()=>goProject(p.id)} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 0',borderBottom:`1px solid ${C.border}`,cursor:'pointer'}}>
                <div>
                  <div style={{fontSize:11.5,fontWeight:700,color:C.blue}}>{p.client} — {p.order_label}</div>
                  <div style={{fontSize:9.5,color:C.muted}}>{p.stage}</div>
                </div>
                <Badge color={C.blue}>{p.stage}</Badge>
              </div>
            ))}
          </SectionCard>
        </div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
          <SectionCard title="Nieprzeczytane maile">
            {mailUnread.map((m,i)=>(
              <div key={i} onClick={()=>m.client&&goClient(m.client)} style={{padding:'7px 0',borderBottom:i<mailUnread.length-1?`1px solid ${C.border}`:'none',cursor:m.client?'pointer':'default'}}>

                <div style={{fontSize:10.5,color:C.muted}}>{m.subj} <span>· {m.mailbox}mychinapal.pl</span></div>

          </SectionCard>
          <SectionCard title="Nieprzeczytane wiadomości czatu">
            {chatUnread.map((c,i)=>(
              <div key={i} onClick={()=>c.client&&goClient(c.client)} style={{display:'flex',justifyContent:'space-between',padding:'7px 0',borderBottom:i<chatUnread.length-1?`1px solid ${C.border}`:'none',cursor:c.client?'pointer':'default',alignItems:'center'}}>
                <div style={{fontSize:11,fontWeight:700}}>{c.channel}</div>
                <Badge color={C.red} bg={C.rlight}>{c.msgs} nowe</Badge>
              </div>
            ))}
          </SectionCard>
        </div>

      </div>
    </div>
  );
}

function ClientList({onSelect}) {
  const [search,setSearch] = useState('');
  const [sortBy,setSortBy] = useState('m');
  const list = D.clients.filter(c=>c.name.toLowerCase().includes(search.toLowerCase()));
  list.sort((a,b)=>{
    if(sortBy==='m') return b.margin-a.margin;
    if(sortBy==='p') return b.revenue-a.revenue;
    return a.name.localeCompare(b.name);
  });
  return (
    <div>
      <PageHeader title="Klienci & CRM" subtitle={`${D.clients.length} kontrahentów w bazie`} right={
        <button style={{padding:'7px 13px',borderRadius:6,border:'none',fontSize:11,fontWeight:600,cursor:'pointer',background:C.blue,color:'#fff'}}>+ Nowy klient</button>
      }/>
      <div style={{padding:'16px 22px',maxWidth:1500,margin:'0 auto'}}>
        <div style={{display:'flex',gap:8,marginBottom:12,alignItems:'center'}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Szukaj klienta…" style={{border:`1px solid ${C.border}`,borderRadius:7,padding:'8px 12px',fontSize:11.5,outline:'none',width:260}}/>

function ClientDetail({client,onBack,goProject,goBank}) {
  const projects = D.projects.filter(p=>p.client===client.name);
  const invoices = D.invoices.filter(inv=>inv.kontrahent===client.name||inv.przypisany_klient===client.name).slice(0,6);
  const relatedTx = D.txs.filter(t=>t.assign===client.name).sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,8);
  const docFolders = [
    {l:'Faktury', n:invoices.filter(i=>i.typ==='sprzedażowa').length},
    {l:'Wyceny', n:0},
    {l:'Transport', n:invoices.filter(i=>i.typ==='transportowa').length},
    {l:'Cło', n:invoices.filter(i=>i.typ==='celna/import').length},
  ];
  return (
    <div>
      <PageHeader title={client.name} subtitle={client.full_name!==client.name?client.full_name:'Pełna nazwa niepotwierdzona w danych źródłowych'} right={
        <div style={{display:'flex',gap:6}}>
          <button onClick={()=>goBank(client.name)} style={{padding:'7px 13px',borderRadius:6,border:`1px solid ${C.blue}`,fontSize:11,fontWeight:600,cursor:'pointer',background:'transparent',color:C.blue}}>🏦 Transakcje w Kasa&Bank</button>
        </div>
      }/>
      <div style={{padding:'16px 22px',maxWidth:1500,margin:'0 auto'}}>
        <BackBtn onClick={onBack} label="Wróć do listy klientów"/>

        <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:9,marginBottom:14}}>
          <StatCard label="Przychód netto" value={fmt(client.revenue,0)+' PLN'} color={C.blue}/>
          <StatCard label="Zakup (Chiny)" value={fmt(client.purchase,0)+' PLN'} color={C.red}/>
          <StatCard label="Transport + cło" value={fmt(client.transport+client.customs,0)+' PLN'} color={'#C2410C'}/>
          <StatCard label="Marża" value={(client.margin>=0?'+':'')+fmt(client.margin,0)+' PLN'} color={client.margin>=0?C.green:C.red}/>

        </div>

        <div style={{display:'grid',gridTemplateColumns:'1.3fr 1fr',gap:14}}>
          <div>
            <SectionCard title={`Projekty klienta (${projects.length})`}>
              {projects.length===0&&<div style={{fontSize:11,color:C.muted}}>Brak zarejestrowanych zleceń.</div>}
              {projects.map(p=>(
                <div key={p.id} onClick={()=>goProject(p.id)} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 0',borderBottom:`1px solid ${C.border}`,cursor:'pointer'}}>
                  <div>
                    <div style={{fontSize:11.5,fontWeight:700,color:C.blue}}>{p.order_label}</div>
                    <div style={{fontSize:9.5,color:C.muted}}>{p.stage}</div>
                  </div>
                  <div style={{fontWeight:700,color:p.margin>=0?C.green:C.red,fontSize:12}}>{p.margin>=0?'+':''}{fmt(p.margin,0)} PLN</div>
                </div>
              ))}
            </SectionCard>

            <SectionCard title="Powiązane transakcje (ostatnie)" right={<span onClick={()=>goBank(client.name)} style={{fontSize:10.5,color:C.blue,cursor:'pointer',fontWeight:600}}>zobacz wszystkie →</span>}>
              {relatedTx.length===0&&<div style={{fontSize:11,color:C.muted}}>Brak transakcji.</div>}
              {relatedTx.map(t=>(
                <div key={t.id} onClick={()=>goBank(client.name)} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:`1px solid ${C.border}`,cursor:'pointer'}}>
                  <div>
                    <div style={{fontSize:11,fontWeight:600}}>{t.desc?.slice(0,60)}</div>
                    <div style={{fontSize:9.5,color:C.muted,fontFamily:'monospace'}}>{t.date} · {t.id}</div>
                  </div>
                  <div style={{fontWeight:700,fontSize:11.5,color:t.amount>=0?C.green:C.red}}>{fmt(t.amount)} PLN</div>
                </div>
              ))}

          </div>

          <div>
            <SectionCard title="Dokumenty">
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                {docFolders.map((f,i)=>(
                  <div key={i} style={{border:`1px solid ${C.border}`,borderRadius:8,padding:'10px',textAlign:'center'}}>

              <NoteBox>Brak osób kontaktowych w danych źródłowych (wyciąg bankowy ich nie zawiera) — pole do uzupełnienia ręcznie przy realnym wdrożeniu.</NoteBox>

function Klienci({selClient,setSelClient,goProject,goBank}) {
  const client = D.clients.find(c=>c.name===selClient);
  if(client) return <ClientDetail client={client} onBack={()=>setSelClient(null)} goProject={goProject} goBank={goBank}/>;

const STAGES = ['Zamówienie złożone','Produkcja / zakup','Załadunek','Transport','Odprawa celna','Dostawa','Faktura','Zapłata'];

function StageBar({stage}) {
  const idx = STAGES.indexOf(stage);
  return (
    <div style={{display:'flex',alignItems:'center',marginTop:6,marginBottom:2}}>
      {STAGES.map((s,i)=>(
        <React.Fragment key={s}>
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',minWidth:0}}>
            <div style={{width:20,height:20,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:9.5,fontWeight:700,background:i<=idx?C.blue:C.border,color:i<=idx?'#fff':C.muted}}>{i+1}</div>
            <div style={{fontSize:8,color:i===idx?C.blue:C.muted,fontWeight:i===idx?700:400,marginTop:3,textAlign:'center',maxWidth:62}}>{s}</div>
          </div>
          {i<STAGES.length-1&&<div style={{flex:1,height:2,background:i<idx?C.blue:C.border,marginBottom:16}}></div>}
        </React.Fragment>
      ))}
    </div>
  );
}

function Faktury({goClient,goProject,goBank}) {
  const [typ,setTyp] = useState('sprzedażowa');
  const TYPES = [
    {k:'sprzedażowa',l:'Sprzedażowe'},
    {k:'zakupowa',l:'Zakupowe (Chiny)'},
    {k:'transportowa',l:'Transportowe'},
    {k:'celna/import',l:'Celne / import'},
  ];
  const list = D.invoices.filter(i=>i.typ===typ);
  const totalOut = D.vat.find(v=>v.label.includes('należny'))?.val||0;
  const totalIn = D.vat.find(v=>v.label.includes('naliczony razem'))?.val||0;

  return (
    <div>
      <PageHeader title="Faktury & Księgowość" subtitle="Sprzedażowe, zakupowe, importowe, zaliczkowe, pro forma, korygujące, noty" right={
        <button style={{padding:'7px 13px',borderRadius:6,border:'none',fontSize:11,fontWeight:600,cursor:'pointer',background:C.blue,color:'#fff'}}>+ Wystaw fakturę</button>
      }/>
      <div style={{padding:'16px 22px',maxWidth:1500,margin:'0 auto'}}>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:9,marginBottom:14}}>
          <StatCard label="VAT należny (sprzedaż)" value={fmt(totalOut,0)+' PLN'} color={C.red}/>
          <StatCard label="VAT naliczony (odliczalny)" value={fmt(totalIn,0)+' PLN'} color={C.green}/>
          <StatCard label="Faktur w rejestrze" value={D.invoices.length} color={C.blue} sub="wygenerowane z rejestru transakcji bankowych"/>
        </div>

        <div style={{display:'flex',gap:6,marginBottom:12}}>
          {TYPES.map(t=>(

function Ustawienia() {
  const [tab,setTab] = useState('uzytkownicy');
  const TABS = [
    {k:'uzytkownicy',l:'Użytkownicy i uprawnienia'},
    {k:'kursy',l:'Kursy walut'},
    {k:'firma',l:'Dane firmy'},
    {k:'szablony',l:'Szablony faktur'},
    {k:'integracje',l:'Integracje pocztowe'},
  ];
  return (
    <div>
      <PageHeader title="Ustawienia"/>
      <div style={{padding:'16px 22px',maxWidth:1200,margin:'0 auto'}}>
        <div style={{display:'flex',gap:6,marginBottom:14,flexWrap:'wrap'}}>
          {TABS.map(t=>(
            <div key={t.k} onClick={()=>setTab(t.k)} style={{padding:'6px 13px',borderRadius:6,fontSize:11,fontWeight:600,cursor:'pointer',border:`1px solid ${tab===t.k?C.blue:C.border}`,background:tab===t.k?C.blue:'transparent',color:tab===t.k?'#fff':C.muted}}>{t.l}</div>
          ))}
        </div>

        {tab==='uzytkownicy'&&(
          <SectionCard title="Użytkownicy i uprawnienia">
            {[{n:'Jacek Starzyński',r:'Administrator',m:'jacek@mychinapal.pl'},{n:'Adam Starzyński',r:'Logistyka / Księgowość',m:'adam@mychinapal.pl'},{n:'Marek Starzyński',r:'Sprzedaż / CRM',m:'marek@mychinapal.pl'}].map((u,i)=>(
              <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:`1px solid ${C.border}`}}>
                <div><div style={{fontSize:11.5,fontWeight:700}}>{u.n}</div><div style={{fontSize:9.5,color:C.muted}}>{u.m}</div></div>
                <Badge color={C.blue}>{u.r}</Badge>
              </div>
            ))}
          </SectionCard>
        )}

        {tab==='kursy'&&(
          <SectionCard title="Kursy walut">
            <NoteBox>Kursy przykładowe — docelowo pobierane automatycznie z tabeli NBP (API) w dniu operacji.</NoteBox>
            {[{c:'CNY',v:'0,56'},{c:'USD',v:'3,98'},{c:'EUR',v:'4,27'}].map((r,i)=>(
              <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'7px 0',borderBottom:`1px solid ${C.border}`}}>
                <span style={{fontSize:11.5,fontWeight:700}}>{r.c} → PLN</span><span style={{fontSize:11.5}}>{r.v}</span>
              </div>
            ))}
          </SectionCard>
        )}

        {tab==='firma'&&(
          <SectionCard title="Dane firmy">
            <NoteBox>Dane przykładowe — do uzupełnienia realnymi danymi rejestrowymi firmy.</NoteBox>
            {[{l:'Nazwa',v:'MyChinaPal Sp. z o.o.'},{l:'NIP',v:'[do uzupełnienia]'},{l:'KRS',v:'[do uzupełnienia]'},{l:'Adres',v:'[do uzupełnienia]'}].map((r,i)=>(
              <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'7px 0',borderBottom:`1px solid ${C.border}`}}>
                <span style={{fontSize:11,color:C.muted}}>{r.l}</span><span style={{fontSize:11.5,fontWeight:600}}>{r.v}</span>
              </div>
            ))}
          </SectionCard>
        )}

        {tab==='szablony'&&(
          <SectionCard title="Szablony faktur">
            {['Sprzedażowa — domyślna','Zaliczkowa','Korygująca','Pro forma'].map((s,i)=>(
              <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'7px 0',borderBottom:`1px solid ${C.border}`}}>
                <span style={{fontSize:11.5}}>{s}</span><span style={{fontSize:10.5,color:C.blue,cursor:'pointer',fontWeight:600}}>edytuj</span>
              </div>
            ))}
          </SectionCard>
        )}

        {tab==='integracje'&&(
          <SectionCard title="Integracje pocztowe">
            {['Gmail API','Outlook API','IMAP / SMTP (ogólne)'].map((s,i)=>(
              <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 0',borderBottom:`1px solid ${C.border}`}}>
                <span style={{fontSize:11.5}}>{s}</span><Badge color={C.muted} bg={C.bg}>niepodłączone</Badge>
              </div>
            ))}
          </SectionCard>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════
// ═══ MASTER APP ═══
// ═══════════════════════════════

function App() {
  const [module,setModule] = useState('dashboard');
  const [collapsed,setCollapsed] = useState(false);
  const [selClient,setSelClient] = useState(null);
  const [selProject,setSelProject] = useState(null);
  const [txs,setTxs] = useState(D.txs);
  const [bankSeed,setBankSeed] = useState({search:'',q:null,tab:null,nonce:0});

  const goClient = (name) => { setSelClient(name); setModule('klienci'); };
  const goProject = (id) => { setSelProject(id); setModule('projekty'); };
  const goBank = (search,q,tab) => { setBankSeed({search:search||'',q:q||null,tab:tab||null,nonce:Date.now()}); setModule('kasa'); };

  const alerts = txs.filter(t=>!t.assign&&!t.id.startsWith('S-')&&['WN+','MA-'].includes(t.direction)).length;

  return (
    <div style={{display:'flex',minHeight:'100vh',background:C.bg}}>
      <Sidebar module={module} setModule={setModule} collapsed={collapsed} setCollapsed={setCollapsed} alerts={alerts}/>
      <div style={{flex:1,minWidth:0}}>
        {module==='dashboard' && <Dashboard goClient={goClient} goProject={goProject}/>}
        {module==='kasa' && <KasaBankSection txs={txs} setTxs={setTxs} bankSeed={bankSeed} goClient={goClient}/>}
        {module==='klienci' && <Klienci selClient={selClient} setSelClient={setSelClient} goProject={goProject} goBank={goBank}/>}
        {module==='projekty' && <Projekty selProject={selProject} setSelProject={setSelProject} goClient={goClient} goBank={goBank}/>}
        {module==='faktury' && <Faktury goClient={goClient} goProject={goProject} goBank={goBank}/>}
        {module==='logistyka' && <Logistyka goClient={goClient} goProject={goProject}/>}
        {module==='poczta' && <Poczta goClient={goClient} goProject={goProject}/>}
        {module==='czat' && <Czat goClient={goClient} goProject={goProject}/>}
        {module==='raporty' && <Raporty/>}
        {module==='ustawienia' && <Ustawienia/>}
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));

</script>
</body>
</html>
