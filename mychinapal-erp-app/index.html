<title>MyChinaPal ERP</title>

<meta name="theme-color" content="#0A1628" />
<script>
  // Przechwytujemy zdarzenie instalacji PWA jak najwcześniej — w Chrome/Edge
  // na Windowsie potrafi ono odpalić się zanim React zdąży się zamontować
  // i podpiąć nasłuchiwanie, więc bez tego przycisk "Zainstaluj aplikację"
  // czasem w ogóle się nie pokazywał na desktopie z Windowsem.
  window.__pwaInstallEvent = null;
  window.addEventListener('beforeinstallprompt', function (e) {
    e.preventDefault();
    window.__pwaInstallEvent = e;
  });
</script>
